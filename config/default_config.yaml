# Default configuration for IB Wrapper
# Override these values by:
# 1. Creating a local config file and passing its path to Config()
# 2. Setting environment variables (see .env.example)

ib_connection:
  host: "127.0.0.1"
  port: 7497  # 7497 for TWS paper trading, 4001 for IB Gateway paper trading
  client_id: 1
  timeout: 10
  readonly: false

market_data:
  rate_limit_requests: 50  # IB allows 50 requests per 10 minutes for historical data
  rate_limit_window: 600  # 10 minutes in seconds
  default_duration: "1 D"
  default_bar_size: "1 min"
  default_what_to_show: "TRADES"

portfolio:
  auto_subscribe_updates: true
  update_interval: 1.0  # seconds

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/ib_wrapper.log"
  console: true

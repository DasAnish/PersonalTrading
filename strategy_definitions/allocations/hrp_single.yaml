# Hierarchical Risk Parity (HRP) - Single Linkage
# Base allocation strategy using HRP optimization
type: allocation
class: HRPStrategy
market: uk_etfs
description: |
  Hierarchical Risk Parity optimization using single linkage clustering.
  Creates a tree structure of assets and allocates weights inversely
  to cluster variance through recursive bisection.

  Best for: Diversified portfolios with strong diversification benefits

parameters:
  linkage_method: single

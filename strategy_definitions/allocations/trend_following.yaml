# Trend Following Strategy
# Momentum-based allocation with signal processing
type: allocation
class: TrendFollowingStrategy
market: uk_etfs
description: |
  Systematic trend following strategy based on momentum signals.

  Algorithm:
  1. Calculate 2-year momentum using EWMA (60-day half-life)
  2. Normalize by asset volatility
  3. Smooth signals with 5-day exponential average
  4. Threshold weak signals (< 0.1 magnitude)
  5. Allocate inversely to volatility among strong signals

  Best for: Capturing momentum trends, reducing drawdowns in trending markets

parameters:
  lookback_days: 504      # 2 years of trading days
  half_life_days: 60      # EWMA decay parameter
  smooth_window: 5        # Signal smoothing window
  signal_threshold: 0.1   # Threshold for weak signals
  min_volatility: 0.001   # Floor for volatility

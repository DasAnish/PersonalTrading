# Composed Strategy: Trend + Constraints + Vol Target
# Multi-layer composition with momentum, constraints, and vol targeting
type: composed
description: |
  Complex multi-layer strategy combining trend following with risk controls.

  Composition:
  1. Market: UK ETFs
  2. Allocation: Trend Following (momentum signals)
  3. Overlay 1: Constraints (5%-40% position limits)
  4. Overlay 2: Volatility Target (12% annual vol)

  Note: This requires 2-level composition:
  First apply constraints to trend_following,
  then apply vol_target to the result.

  Characteristics:
  - Momentum-driven allocation
  - Constrained position sizing
  - Controlled volatility
  - Multiple risk management layers

  Best for: Sophisticated momentum traders, professional portfolios

layers:
  - constraints_5_40
  - vol_target_12pct

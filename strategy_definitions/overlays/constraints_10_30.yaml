# Weight Constraints: 10% Min, 30% Max
# Stricter position limits on underlying allocation
type: overlay
class: ConstraintStrategy
underlying: trend_following
description: |
  Applies more restrictive minimum and maximum weight constraints.
  Enforces that no position is:
  - Smaller than 10% (removed if below)
  - Larger than 30% (capped at max)

  Results in more balanced, less concentrated portfolios.

  Usage: Apply for conservative, well-diversified portfolios

parameters:
  min_weight: 0.10       # 10% minimum per position
  max_weight: 0.30       # 30% maximum per position

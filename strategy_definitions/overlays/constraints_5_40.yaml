# Weight Constraints: 5% Min, 40% Max
# Enforces position limits on underlying allocation
type: overlay
class: ConstraintStrategy
underlying: hrp_single
description: |
  Applies minimum and maximum weight constraints to portfolio.
  Enforces that no position is:
  - Smaller than 5% (removed if below)
  - Larger than 40% (capped at max)

  Excess weight from removed/capped positions is redistributed
  proportionally to remaining active positions.

  Usage: Apply to control concentration and ensure diversification

parameters:
  min_weight: 0.05       # 5% minimum per position
  max_weight: 0.40       # 40% maximum per position

# Leverage Limit: 1.0x (No Leverage)
# Ensures gross leverage stays at 100% (long-only)
type: overlay
class: LeverageStrategy
underlying: hrp_ward
description: |
  Limits gross leverage to prevent overleveraging.
  Gross leverage = sum of absolute position values.

  At 1.0x: Only long positions allowed (no shorting)
  At 2.0x: Can use 2x leverage (e.g., 150% long + 50% short)

  Usage: Apply for risk-controlled long-only portfolios

parameters:
  max_leverage: 1.0      # 100% = long-only, no leverage
